<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#C9A84C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="穗学伴">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="assets/icons/icon-180.png">
<link rel="apple-touch-icon" sizes="192x192" href="assets/icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="assets/icons/icon-512.png">
<link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg">
<title>穗学伴 — 三年级下册数学</title>
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<style>
/* 首页 */
.grade-grid { display:grid; grid-template-columns:1fr 1fr; gap:var(--space-md); }
.grade-card { background:var(--bg-card); border-radius:var(--radius); padding:24px 16px; text-align:center; border:2px solid transparent; cursor:pointer; transition:all var(--transition-fast); }
.grade-card:active { transform:scale(0.96); }
.grade-card.selected { border-color:var(--gold); background:linear-gradient(135deg,#2a2510,#242424); }
.grade-card .label { font-size:13px; color:var(--text-secondary); margin-bottom:4px; }
.grade-card .title { font-size:22px; font-weight:700; color:var(--gold-light); }
.grade-card .sub { font-size:13px; color:var(--text-secondary); margin-top:6px; }
.home-stats { display:flex; gap:12px; margin:20px 0; }
.stat-card { flex:1; background:var(--bg-card); border-radius:var(--radius-sm); padding:14px 12px; text-align:center; }
.stat-card .num { font-size:26px; font-weight:700; color:var(--gold); }
.stat-card .lbl { font-size:12px; color:var(--text-secondary); margin-top:2px; }
.quick-actions { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-top:20px; }
.quick-btn { background:var(--bg-card); border:1px solid rgba(201,168,76,.2); border-radius:var(--radius-sm); padding:18px 8px; text-align:center; cursor:pointer; transition:all var(--transition-fast); font-size:14px; color:var(--text-primary); }
.quick-btn:active { background:var(--bg-inset); }
.quick-btn .icon { font-size:28px; display:block; margin-bottom:6px; }

/* 章节列表 */
.chapter-list { display:flex; flex-direction:column; gap:10px; }
.chapter-item { background:var(--bg-card); border-radius:var(--radius-sm); padding:16px; display:flex; align-items:center; gap:14px; cursor:pointer; transition:all var(--transition-fast); border:1px solid transparent; }
.chapter-item:active { transform:scale(0.98); }
.chapter-item:hover { border-color:rgba(201,168,76,.25); }
.ch-item-num { width:40px; height:40px; border-radius:50%; background:rgba(201,168,76,.12); color:var(--gold); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px; flex-shrink:0; }
.ch-item-info { flex:1; }
.ch-item-name { font-size:16px; font-weight:600; margin-bottom:4px; }
.ch-item-sub { font-size:12px; color:var(--text-secondary); }
.ch-item-arrow { color:var(--text-secondary); font-size:20px; }

/* 引导页 */
.guide-header { text-align:center; margin-bottom:24px; }
.guide-header .ch-title { font-size:14px; color:var(--text-secondary); margin-bottom:4px; }
.guide-header .topic { font-size:24px; font-weight:700; color:var(--gold-light); }
.guide-step { display:none; background:var(--bg-card); border-radius:var(--radius); padding:24px; margin-bottom:16px; animation:fadeIn .4s ease; }
.guide-step.active { display:block; }
.guide-step .step-num { font-size:12px; color:var(--text-secondary); margin-bottom:8px; letter-spacing:1px; }
.guide-step .step-title { font-size:20px; font-weight:600; margin-bottom:16px; color:var(--gold); }
.guide-step .step-content { font-size:17px; line-height:1.8; color:var(--text-primary); }
.voice-btn { position:absolute; top:16px; right:20px; width:44px; height:44px; border-radius:50%; border:2px solid var(--gold); background:rgba(201,168,76,.1); color:var(--gold); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all var(--transition-fast); z-index:5; }
.voice-btn:active { transform:scale(.9); }
.voice-btn.playing { animation:pulse 1s infinite; background:rgba(201,168,76,.25); }
.voice-btn.muted { opacity:.4; }

/* 答题 */
.quiz-card { background:var(--bg-card); border-radius:var(--radius); padding:28px 24px; margin-bottom:20px; }
.quiz-card .q-type { font-size:12px; color:var(--gold); letter-spacing:1px; margin-bottom:10px; }
.quiz-card .q-text { font-size:20px; line-height:1.6; font-weight:500; }
.quiz-options { display:flex; flex-direction:column; gap:10px; }
.quiz-options .opt { background:var(--bg-card); border:2px solid #333; border-radius:var(--radius-sm); padding:16px; font-size:17px; cursor:pointer; transition:all var(--transition-fast); text-align:left; }
.quiz-options .opt:active { transform:scale(.98); }
.quiz-options .opt.selected { border-color:var(--gold); background:rgba(201,168,76,.1); }
.quiz-options .opt.correct { border-color:var(--green); background:var(--green-bg); }
.quiz-options .opt.wrong { border-color:var(--red); background:var(--red-bg); }

/* 结果 */
.result-summary { text-align:center; padding:32px; background:var(--bg-card); border-radius:var(--radius); margin-bottom:20px; }
.result-summary .big-num { font-size:56px; font-weight:700; color:var(--gold); }
.result-summary .detail { display:flex; justify-content:center; gap:24px; margin-top:16px; font-size:14px; color:var(--text-secondary); }

/* 响应式调整 */
@media(max-width:599px) {
  .grade-grid { grid-template-columns:1fr 1fr; gap:10px; }
  .quick-actions { grid-template-columns:1fr 1fr; }
  .quiz-card .q-text { font-size:17px; }
  .guide-step .step-title { font-size:18px; }
  .guide-header .topic { font-size:20px; }
}
@media(min-width:768px) {
  .chapter-item { padding:20px; }
  .quiz-card { padding:36px 32px; }
  .quiz-card .q-text { font-size:22px; }
}
</style>
</head>
<body>
<div class="app">

  <!-- ====== HEADER ====== -->
  <div class="header">
    <button class="back-btn" id="backBtn" onclick="goBack()">‹</button>
    <h1>🌾 穗学伴</h1>
    <button class="voice-btn muted" id="voiceBtn" onclick="handleVoiceToggle()" title="朗读本页" style="position:static;width:36px;height:36px;font-size:16px;">🔇</button>
  </div>

  <!-- ====== PAGE: HOME ====== -->
  <div class="page active" id="page-home">
    <p style="color:var(--text-secondary);font-size:14px;margin-bottom:16px;" id="homeGreeting">今天也一起学习吧 ✨</p>
    <div class="grade-grid">
      <div class="grade-card selected" id="gradeCard">
        <div class="label">当前年级</div>
        <div class="title">三年级 · 下册</div>
        <div class="sub" id="gradeInfo">89 道题 · 9 章</div>
      </div>
      <div class="grade-card" onclick="alert('四年级即将开放 🚧')">
        <div class="label">切换</div>
        <div class="title">四年级 · 上册</div>
        <div class="sub">即将开放</div>
      </div>
    </div>
    <div class="home-stats" id="homeStats">
      <div class="stat-card"><div class="num" id="statToday">0</div><div class="lbl">今日做题</div></div>
      <div class="stat-card"><div class="num" id="statRate">—</div><div class="lbl">正确率</div></div>
      <div class="stat-card"><div class="num" id="statStreak">🔥0</div><div class="lbl">连续打卡</div></div>
    </div>
    <div class="quick-actions">
      <div class="quick-btn" onclick="navigate('chapters')"><span class="icon">📚</span>开始练习</div>
      <div class="quick-btn" onclick="navigate('wrongbook')"><span class="icon">📕</span>错题本</div>
      <div class="quick-btn" onclick="navigate('dashboard')"><span class="icon">📊</span>家长看板</div>
    </div>
  </div>

  <!-- ====== PAGE: CHAPTERS ====== -->
  <div class="page" id="page-chapters">
    <p style="color:var(--text-secondary);font-size:14px;margin-bottom:16px;">三年级 · 下册 — 共 9 章</p>
    <div class="chapter-list" id="chapterList"></div>
  </div>

  <!-- ====== PAGE: GUIDE ====== -->
  <div class="page" id="page-guide" style="position:relative;">
    <div class="guide-header">
      <div class="ch-title" id="guideChapterLabel">第 6 章</div>
      <div class="topic" id="guideTopic">年、月、日</div>
    </div>
    <div id="guideSteps"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="guidePrev" onclick="guidePrev()">← 上一步</button>
      <button class="btn btn-primary" id="guideNext" onclick="guideNext()">继续 →</button>
    </div>
  </div>

  <!-- ====== PAGE: QUIZ ====== -->
  <div class="page" id="page-quiz">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
      <span style="font-size:14px;color:var(--text-secondary);white-space:nowrap;" id="quizCount">1/5</span>
      <div class="progress-bar" style="flex:1;"><div class="progress-fill" id="quizFill" style="width:20%"></div></div>
    </div>
    <div class="quiz-card" id="quizCard"></div>
    <div class="feedback" id="quizFeedback"></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="quizSubmit" onclick="quizSubmit()" style="display:none;">确认答案</button>
      <button class="btn btn-primary" id="quizNext" onclick="quizNext()" style="display:none;">下一题 →</button>
    </div>
  </div>

  <!-- ====== PAGE: RESULT ====== -->
  <div class="page" id="page-result">
    <div class="result-summary">
      <div class="big-num" id="resultScore">0%</div>
      <div style="font-size:18px;margin-top:8px;" id="resultLabel">继续加油！</div>
      <div class="detail">
        <span id="resultCorrect">✅ 0 题</span>
        <span id="resultWrong">❌ 0 题</span>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="navigate('chapters')">← 返回章节</button>
      <button class="btn btn-success" id="resultAction" onclick="retryGuide()">🔄 再看一遍动画</button>
    </div>
  </div>

  <!-- ====== PAGE: WRONG BOOK ====== -->
  <div class="page" id="page-wrongbook">
    <div class="empty-state" id="wrongbookState">
      <div class="icon">📕</div>
      <p>还没有错题记录<br>做完练习再来看看吧 🌟</p>
    </div>
    <div id="wrongbookList"></div>
  </div>

  <!-- ====== PAGE: DASHBOARD ====== -->
  <div class="page" id="page-dashboard">
    <div class="empty-state">
      <div class="icon">📊</div>
      <p>家长看板<br>做几轮练习后就能看到数据啦</p>
      <span class="tag tag-demo">Stage 2 · 后续实现</span>
    </div>
  </div>

</div>

<script>
// 题库数据（三年级下册 89题）
const QUESTION_BANK = [];
</script>
<script src="js/router.js"></script>
<script src="js/store.js"></script>
<script src="js/guide-data.js"></script>
<script src="js/voice.js"></script>
<script src="js/quiz-engine.js"></script>
<script src="js/app.js"></script>
<script>
// 注册 Service Worker (PWA 离线支持)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    console.log('SW 注册成功, 作用域:', reg.scope);
  }).catch(err => {
    console.warn('SW 注册失败:', err);
  });
}
</script>
</body>
</html>
