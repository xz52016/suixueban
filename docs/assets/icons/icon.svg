<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2a2510"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8D48B"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 边框 -->
  <rect x="8" y="8" width="496" height="496" rx="90" fill="none" stroke="#C9A84C" stroke-width="4" opacity="0.3"/>
  <!-- 麦穗 - 左 -->
  <g transform="translate(120,320) rotate(-15)">
    <line x1="0" y1="0" x2="0" y2="-200" stroke="#C9A84C" stroke-width="6" stroke-linecap="round"/>
    <ellipse cx="0" cy="-30" rx="14" ry="8" fill="url(#gold)" opacity="0.9"/>
    <ellipse cx="0" cy="-60" rx="13" ry="7" fill="url(#gold)" opacity="0.85"/>
    <ellipse cx="0" cy="-90" rx="12" ry="7" fill="url(#gold)" opacity="0.8"/>
    <ellipse cx="0" cy="-120" rx="11" ry="6" fill="url(#gold)" opacity="0.75"/>
    <ellipse cx="0" cy="-150" rx="10" ry="6" fill="url(#gold)" opacity="0.7"/>
  </g>
  <!-- 麦穗 - 右 -->
  <g transform="translate(392,320) rotate(15)">
    <line x1="0" y1="0" x2="0" y2="-200" stroke="#C9A84C" stroke-width="6" stroke-linecap="round"/>
    <ellipse cx="0" cy="-30" rx="14" ry="8" fill="url(#gold)" opacity="0.9"/>
    <ellipse cx="0" cy="-60" rx="13" ry="7" fill="url(#gold)" opacity="0.85"/>
    <ellipse cx="0" cy="-90" rx="12" ry="7" fill="url(#gold)" opacity="0.8"/>
    <ellipse cx="0" cy="-120" rx="11" ry="6" fill="url(#gold)" opacity="0.75"/>
    <ellipse cx="0" cy="-150" rx="10" ry="6" fill="url(#gold)" opacity="0.7"/>
  </g>
  <!-- 书本 -->
  <g transform="translate(256,260)">
    <path d="M-80,40 L-80,-80 Q-80,-110 -50,-110 L50,-110 Q80,-110 80,-80 L80,40 Q50,20 0,30 Q-50,20 -80,40Z" fill="none" stroke="url(#gold)" stroke-width="5" stroke-linejoin="round"/>
    <!-- 书脊 -->
    <line x1="0" y1="30" x2="0" y2="-110" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
    <!-- 文字 穗 -->
    <text x="0" y="-45" text-anchor="middle" fill="url(#gold)" font-size="64" font-weight="700" font-family="serif">穗</text>
  </g>
  <!-- 底部文字 -->
  <text x="256" y="440" text-anchor="middle" fill="#C9A84C" font-size="32" font-weight="600" font-family="sans-serif" opacity="0.7">穗学伴</text>
</svg>
